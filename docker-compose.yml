services:
  postgres:
    image: postgres:16
    container_name: acnedetect-postgres
    environment:
      POSTGRES_DB: acnedetect_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ai:
    build: ./Acne-Vision
    container_name: acnedetect-ai
    environment:
      CNN_MODEL_PATH: /app/output/best_model.keras
      MODEL_PATH: /app/output/best_model.keras
      SKINCARE_MODEL_PATH: /app/output/skincare_cnn_integrated.pkl
      PORT: 8000
    ports:
      - "8000:8000"

  backend:
    build: ./backend
    container_name: acnedetect-backend
    depends_on:
      - postgres
      - ai
    environment:
      PORT: 5000
      NODE_ENV: development
      CLIENT_URL: http://localhost:5173
      PUBLIC_API_URL: http://localhost:5000
      FASTAPI_URL: http://ai:8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: acnedetect_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSL: "false"
      JWT_SECRET: change_this_to_a_long_random_secret
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
